services:
  backend:
    build: ./backend
    container_name: hcai-backend
    restart: unless-stopped
    environment:
      - PORT=3001
      - FRONTEND_URL=http://localhost
    volumes:
      - backend-data:/app/data
    ports:
      - "3001:3001"

  frontend:
    build: ./webpage
    container_name: hcai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend-data:
