services:
  backend:
    build: ./backend
    container_name: hcai-backend
    restart: unless-stopped
    environment:
      - PORT=${PORT}
      - FRONTEND_URL=${FRONTEND_URL}
      - MONGODB_URI=${MONGODB_URI}
    volumes:
      - backend-data:/app/data
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    container_name: hcai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend-data: