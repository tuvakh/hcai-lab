services:
  backend:
    build: ./backend
    container_name: hcai-backend
    restart: unless-stopped
    environment:
      - PORT=3001
      - FRONTEND_URL=http://localhost
      - MONGODB_URI=mongodb+srv://team1:REDACTED@hcai-lab.ww8wgz8.mongodb.net/hcai
    volumes:
      - backend-data:/app/data
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    container_name: hcai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend-data:
